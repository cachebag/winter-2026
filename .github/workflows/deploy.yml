name: Deploy Flashcards to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "OS-flashcards/**"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: OS-flashcards/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: OS-flashcards

      - name: Build
        run: npm run build
        working-directory: OS-flashcards

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: OS-flashcards/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
